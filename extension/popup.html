<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>沉浸式学习英语</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <span class="header-logo">
      <span class="header-logo-letter">E</span>
    </span>
    <h1>沉浸式学习英语</h1>
  </header>

  <main>
    <section class="section">
      <div class="status-row">
        <span id="statusText">是否打开功能</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggleSwitch" checked>
          <span class="toggle-switch-slider"></span>
        </label>
      </div>
    </section>

    <section class="section">
      <div class="status-row">
        <span>仅当前等级</span>
        <label class="toggle-switch">
          <input type="checkbox" id="levelOnlySwitch">
          <span class="toggle-switch-slider"></span>
        </label>
      </div>
    </section>

    <section class="section">
      <div class="drawer-row">
        <label class="drawer-label" for="levelSelect">翻译等级</label>
        <select id="levelSelect" class="select">
          <option value="A1">A1</option>
          <option value="A2">A2</option>
          <option value="B1" selected>B1</option>
          <option value="B2">B2</option>
          <option value="C1">C1</option>
        </select>
      </div>
    </section>

    <section class="section">
      <div class="label">下划线颜色</div>
      <div class="color-presets" id="colorPresets"></div>
      <div class="color-custom">
        <input type="color" id="colorPicker" class="color-input" value="#b794f6" aria-label="自定义下划线颜色">
        <span class="color-value" id="colorValue">#B794F6</span>
      </div>
      <div class="color-preview">
        预览：<span class="preview-sample" id="colorPreview">apple</span>
      </div>
    </section>

    <section class="section">
      <div class="label">本页统计</div>
      <div class="stats-box">
        <div>已替换: <strong id="replaceCount">0</strong> 个单词</div>
        <div>最高等级: <strong id="highestLevel">—</strong></div>
      </div>
    </section>

    <section class="tip">
      💡 鼠标悬停在英文单词上可查看中文原文
    </section>
  </main>

  <footer class="footer">
    <span>v1.0.0</span>
    <a href="https://github.com/code-corey/EnglishViewLearner" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
